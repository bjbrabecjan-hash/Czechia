<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Czech Clue Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Spectral:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-backdrop"></div>
    <main class="game-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Educational map game</p>
          <h1>Czech Clue Quest</h1>
        </div>
        <div class="scorebox">
          <p>Score: <span id="score">0</span></p>
          <p>Round: <span id="round">1</span> / <span id="roundTotal">6</span></p>
          <button id="soundToggle" class="btn btn-ghost" type="button" aria-pressed="true">Sound: On</button>
        </div>
      </header>

      <section class="layout">
        <aside class="panel panel-clues">
          <h2 id="panelTitle">Learn About Czechia</h2>
          <p id="introText">
            Start with quick facts and simple visuals, then continue to the trivia quiz.
          </p>

          <div id="clueCards" class="clue-grid"></div>

          <div class="controls">
            <button id="revealBtn" class="btn btn-primary">Reveal Next Clue</button>
            <button id="nextBtn" class="btn btn-secondary">Next Fact</button>
          </div>

          <div id="statusBox" class="status">Round started. Reveal a clue to begin.</div>

          <div id="factsBox" class="facts hidden">
            <h3>Did you know?</h3>
            <ul id="factsList"></ul>
          </div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
